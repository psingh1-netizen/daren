<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>El Lloc Web d'en Daren</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Verdana, sans-serif;
            background: linear-gradient(to right, #0f9b0f, #000000);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
        }

        .card {
            background: white;
            color: #333;
            margin: 30px auto;
            padding: 25px;
            width: 85%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button {
            background-color: #0f9b0f;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #000000;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Benvingut al lloc web d'en Daren ⚽🔥</h1>
        <p>Hola! Sóc en Daren, tinc 14 anys i m'encanta jugar a futbol!</p>
    </header>

    <div class="card">
        <h2>Sobre mi</h2>
        <p>El futbol és la meva passió ⚽💚. M'encanta entrenar, jugar partits i marcar gols!</p>
        <button onclick="mostrarMissatge()">Fes clic aquí!</button>
    </div>

    <footer>
        © 2026 Daren | Fet amb ❤️
    </footer>

    <script>
        function mostrarMissatge() {
            alert("Visca el futbol! ⚽🔥 Gràcies per visitar el meu lloc web!");
        }
    </script>

</body>
</html>
